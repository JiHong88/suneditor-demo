version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
        # 빌드 후 불필요한 패키지/바이너리 제거
        - npm prune --production
        - rm -rf node_modules/@swc/core-linux-x64-gnu node_modules/@swc/core-linux-x64-musl
        - rm -rf node_modules/next/next-swc-fallback
        - rm -rf node_modules/@rolldown node_modules/@img
        - rm -rf node_modules/typescript
        - rm -rf node_modules/puppeteer/.local-chromium node_modules/@puppeteer
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
