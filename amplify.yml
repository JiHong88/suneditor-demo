version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - rm -rf .next
        - npm run build
        # 빌드 후 불필요한 패키지/바이너리 제거
        - npm prune --production
        - rm -rf node_modules/@swc/core-linux-x64-gnu node_modules/@swc/core-linux-x64-musl
        - rm -rf node_modules/next/next-swc-fallback
        - rm -rf node_modules/@rolldown node_modules/@img
        - rm -rf node_modules/typescript
        # 디버깅 — 용량 확인 후 제거
        - du -sh .next/ node_modules/ public/ || true
        - du -sh .next/*/ | sort -rh | head -10 || true
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
